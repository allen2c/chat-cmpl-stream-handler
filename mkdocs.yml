site_name: chat-cmpl-stream-handler
site_description: A lightweight Python library for handling OpenAI-compatible chat completion streams with automatic tool call execution.
site_url: https://allen2c.github.io/chat-cmpl-stream-handler/
repo_url: https://github.com/allen2c/chat-cmpl-stream-handler
repo_name: allen2c/chat-cmpl-stream-handler

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables

nav:
  - Home: index.md
